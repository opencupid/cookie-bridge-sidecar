services:
  cookie-bridge:
    build: .
    restart: always
    environment:
      - BRIDGE_SECRET=${BRIDGE_SECRET}
      - NODE_ENV=production
    labels:
      traefik.enable: "true"
      traefik.http.services.cookie-bridge.loadbalancer.server.port: "3099"

      # Bidirectional: each participating host needs /_migrate -> /export and
      # /_bridge -> /import. Hostnames are hardcoded per deployment; replace
      # the old/new example.org values with your real brand domains.

      # --- old.example.org ---
      traefik.http.routers.bridge-export-old.rule: "Host(`old.example.org`) && Path(`/_migrate`)"
      traefik.http.routers.bridge-export-old.entrypoints: websecure
      traefik.http.routers.bridge-export-old.tls.certResolver: letsencrypt
      traefik.http.routers.bridge-export-old.priority: "100"
      traefik.http.routers.bridge-export-old.middlewares: bridge-export-prefix

      traefik.http.routers.bridge-import-old.rule: "Host(`old.example.org`) && Path(`/_bridge`)"
      traefik.http.routers.bridge-import-old.entrypoints: websecure
      traefik.http.routers.bridge-import-old.tls.certResolver: letsencrypt
      traefik.http.routers.bridge-import-old.priority: "100"
      traefik.http.routers.bridge-import-old.middlewares: bridge-import-rewrite

      # --- new.example.org ---
      traefik.http.routers.bridge-export-new.rule: "Host(`new.example.org`) && Path(`/_migrate`)"
      traefik.http.routers.bridge-export-new.entrypoints: websecure
      traefik.http.routers.bridge-export-new.tls.certResolver: letsencrypt
      traefik.http.routers.bridge-export-new.priority: "100"
      traefik.http.routers.bridge-export-new.middlewares: bridge-export-prefix

      traefik.http.routers.bridge-import-new.rule: "Host(`new.example.org`) && Path(`/_bridge`)"
      traefik.http.routers.bridge-import-new.entrypoints: websecure
      traefik.http.routers.bridge-import-new.tls.certResolver: letsencrypt
      traefik.http.routers.bridge-import-new.priority: "100"
      traefik.http.routers.bridge-import-new.middlewares: bridge-import-rewrite

      # --- Shared middlewares ---
      traefik.http.middlewares.bridge-export-prefix.addprefix.prefix: "/export"
      traefik.http.middlewares.bridge-import-rewrite.replacepath.path: "/import"
